<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" fill="#010402"/>

  <!-- Orbit ring -->
  <ellipse cx="64" cy="64" rx="50" ry="30" fill="none" stroke="#006600" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Planet -->
  <circle cx="64" cy="64" r="12" fill="#2080e0"/>

  <!-- Ship on orbit -->
  <polygon points="100,48 96,56 104,56" fill="#00ff00"/>

  <!-- Stars -->
  <circle cx="20" cy="20" r="1" fill="#00aa00"/>
  <circle cx="108" cy="30" r="1" fill="#00aa00"/>
  <circle cx="30" cy="100" r="1" fill="#00aa00"/>
  <circle cx="90" cy="110" r="1" fill="#00aa00"/>
</svg>
